name: Scraper CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        browser: [chrome, firefox]

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ml-scraper:ci -f hit6/Dockerfile hit6

      - name: Tests + coverage
        run: |
          docker run --rm \
            ml-scraper:ci \
            python -m pytest --cov=. --cov-fail-under=70
