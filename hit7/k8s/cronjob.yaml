apiVersion: batch/v1
kind: CronJob
metadata:
  name: scraper-hourly
  namespace: ml-scraper
spec:
  schedule: "0 * * * *"

  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: scraper
              image: ml-scraper:latest
              imagePullPolicy: IfNotPresent

              envFrom:
                - configMapRef:
                    name: scraper-config

              volumeMounts:
                - name: output
                  mountPath: /app/output

          volumes:
            - name: output
              persistentVolumeClaim:
                claimName: scraper-output
