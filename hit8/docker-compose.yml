services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=scraper_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"

  scraper:
    build: .
    command: ["python", "scraper.py"]
    environment:
      - HEADLESS=true
      - BROWSER=firefox
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=scraper_db
    depends_on:
      - db
    volumes:
      - ./output:/app/output
      - ./screenshots:/app/screenshots
